spring:
  application:
    name: xuma-pos
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/xuma}
    username: ${DB_USER:xuma}
    password: ${DB_PASS:xuma}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc.time_zone: UTC
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2s
  threads:
    virtual:
      enabled: true

server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework
  shutdown: graceful
  error:
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

xuma:
  jwt:
    secret: ${JWT_SECRET:super-secret-key-that-must-be-at-least-32-chars-long-for-hs256-signature}
    access-ttl-minutes: 15
    refresh-ttl-days: 7
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000}

logging:
  pattern:
    console: "%d{HH:mm:ss.SSS} %-5level [%X{traceId:-},%X{spanId:-}] %logger{36} - %msg%n"
  level:
    com.xuma.pos: INFO
    org.springframework.security: INFO
